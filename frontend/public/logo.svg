<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B3FE4"/>
      <stop offset="100%" stop-color="#38AFEA"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38AFEA"/>
      <stop offset="100%" stop-color="#7B3FE4"/>
    </linearGradient>
  </defs>

  <!-- Circle outline -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#circleGrad)" stroke-width="2.5"/>

  <!-- Heartbeat / EKG line -->
  <polyline
    points="8,50 22,50 28,50 32,38 36,62 42,30 48,68 54,50 60,50 72,50 92,50"
    fill="none"
    stroke="url(#lineGrad)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- REFLEX text -->
  <text
    x="108"
    y="66"
    font-family="'Rajdhani', 'Barlow', 'Arial', sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="3"
    fill="white"
  >REFLEX</text>
</svg>
